<!DOCTYPE html>
<html>
<head>
    <style>
        #alert { display:none; position:fixed; top:0; background:rgba(0,0,0,0.9); width:100%; height:100%; color:white; text-align:center; padding-top:50px; }
        .box { border: 2px solid red; padding: 20px; width: 80%; margin: auto; }
    </style>
</head>
<body>
    <div id="alert">
        <div class="box">
            <h2>NOUVELLE VERSION !</h2>
            <p>Merci de mettre à jour votre application My Box TV.</p>
            <a href="My Box TV_1_1.0.apk" style="color:red; font-weight:bold;">TÉLÉCHARGER ICI</a>
        </div>
    </div>

    <script>
        async function check() {
            const installed = "1.0.0"; // Version dans ton APK
            const res = await fetch('version.json');
            const data = await res.json();
            if(data.version !== installed) {
                document.getElementById('alert').style.display = 'block';
            }
        }
        check();
    </script>
</body>
</html>
